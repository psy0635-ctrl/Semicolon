<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박수용 | 프로필</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* 페이지 전체 테마 (다크 모드 기준) */
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }
        .profile-container {
            max-width: 600px;
            width: 100%;
            background: #2d2d2d;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .name {
            font-size: 2rem;
            margin: 10px 0;
            color: #ff4500; /* 강조색 */
        }
        .role {
            color: #86868b;
            font-size: 1.1rem;
        }
        .section {
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 1.2rem;
            color: #007aff;
            margin-bottom: 10px;
            border-left: 4px solid #007aff;
            padding-left: 10px;
        }
        .skill-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            background: #444;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #86868b;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="header">
        <div class="name">박수용</div>
        <div class="role">예비 개발자 | Semicolon Member</div>
        <p style="color: #ccc; line-height: 1.6;">
            꾸준히 성장하며 효율적인 코드를 고민하는 개발자 지망생입니다.
        </p>
    </div>

    <div class="section">
        <div class="section-title">기술 스택 (Tech Stacks)</div>
        <div class="skill-tags">
            <span class="tag">C / C#</span>
            <span class="tag">Java</span>
            <span class="tag">HTML/CSS</span>
            <span class="tag">Linux</span>
            <span class="tag">Git & GitHub</span>
        </div>
    </div>

    <div class="section">
        <div class="section-title">관심 분야</div>
        <ul style="list-style: none; padding: 0; color: #ddd;">
            <li>🚀 시스템 프로그래밍 및 리눅스 관리</li>
            <li>💻 C#을 활용한 윈도우 애플리케이션 개발</li>
            <li>🛠 오픈소스 프로젝트 협업</li>
        </ul>
    </div>

    <div class="section">
        <div class="section-title">Contact</div>
        <p style="color: #ddd;">GitHub: <a href="#" style="color: #007aff; text-decoration: none;">@suyong-park</a></p>
    </div>

    <a href="index.html" class="back-btn">← 메인 페이지로 돌아가기</a>
</div>

</body>
</html>
